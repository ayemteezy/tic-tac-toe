<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
    <title>Odin | Tic Tac Toe</title>
  </head>
  <body>
    <main>
      <div class="main-left">
        <h1>tic. <span> tac. </span> toe.</h1>
      </div>
      <div class="main-right">
        <div class="result-popup">
          <p class="result"></p>
        </div>
        <div class="game-container"></div>
      </div>
    </main>

    <dialog id="setupModal">
      <form id="setupForm">
        <div class="field">
          <label for="playerOne">Player 1 (X)</label>
          <input
            type="text"
            name="playerOne"
            id="playerOne"
            placeholder="e.g UserOne"
            required
          />
        </div>
        <div class="field">
          <label for="playerTwo">Player 2 (O)</label>
          <input
            type="text"
            name="playerTwo"
            id="playerTwo"
            placeholder="e.g UserTwo"
            required
          />
        </div>
        <div class="btn-container">
          <button class="play-btn" type="submit">Play</button>
          <button class="close-btn" type="button">Close</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
